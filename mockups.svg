<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200">
  <style>
    .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 500 20px Arial, sans-serif; fill: #334155; }
    .screenTitle { font: 700 18px Arial, sans-serif; fill: #0f172a; }
    .text { font: 14px Arial, sans-serif; fill: #334155; }
    .small { font: 12px Arial, sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
    .phone { fill: #f8fafc; stroke: #0f172a; stroke-width: 3; rx: 24; }
    .btnPrimary { fill: #0ea5e9; rx: 8; }
    .btnSecondary { fill: #e2e8f0; rx: 8; }
  </style>

  <rect width="1600" height="2200" fill="#f1f5f9"/>
  <text x="60" y="70" class="title">Smart Health Assistant - Prototipi zaslonskih mask</text>
  <text x="60" y="105" class="subtitle">Low-fidelity wireframe mockups (za prototipno dokumentacijo)</text>

  <!-- phone 1 -->
  <rect x="60" y="150" width="340" height="460" class="phone"/>
  <text x="90" y="185" class="screenTitle">1) Uvod / Profil</text>
  <rect x="85" y="205" width="290" height="28" class="box"/><text x="95" y="224" class="text">Ime in priimek</text>
  <rect x="85" y="243" width="140" height="28" class="box"/><text x="95" y="262" class="text">Starost</text>
  <rect x="235" y="243" width="140" height="28" class="box"/><text x="245" y="262" class="text">Spol</text>
  <rect x="85" y="281" width="140" height="28" class="box"/><text x="95" y="300" class="text">Visina</text>
  <rect x="235" y="281" width="140" height="28" class="box"/><text x="245" y="300" class="text">Teza</text>
  <rect x="85" y="319" width="290" height="28" class="box"/><text x="95" y="338" class="text">Alergije</text>
  <rect x="85" y="357" width="290" height="56" class="box"/><text x="95" y="388" class="text">Kronicne tezave</text>
  <rect x="85" y="435" width="290" height="36" class="btnPrimary"/><text x="175" y="458" class="text" fill="#fff">Shrani profil</text>

  <!-- phone 2 -->
  <rect x="440" y="150" width="340" height="460" class="phone"/>
  <text x="470" y="185" class="screenTitle">2) Dashboard</text>
  <rect x="465" y="205" width="290" height="50" class="box"/>
  <text x="475" y="226" class="text">Pozdravljen, Tanej</text>
  <text x="475" y="245" class="small">2 opomnika | Zadnji vnos: pred 3h</text>
  <rect x="465" y="270" width="138" height="40" class="btnSecondary"/><text x="490" y="294" class="text">Dodaj simptom</text>
  <rect x="617" y="270" width="138" height="40" class="btnSecondary"/><text x="640" y="294" class="text">Meritve</text>
  <rect x="465" y="318" width="138" height="40" class="btnSecondary"/><text x="505" y="342" class="text">Zdravila</text>
  <rect x="617" y="318" width="138" height="40" class="btnSecondary"/><text x="652" y="342" class="text">OCR</text>
  <rect x="465" y="366" width="290" height="85" class="box"/>
  <text x="475" y="388" class="text">Povzetek:</text>
  <text x="475" y="408" class="small">Pocutje: dobro</text>
  <text x="475" y="426" class="small">Temperatura: 36.8 C | Utrip: 72 bpm</text>
  <rect x="465" y="470" width="290" height="28" class="box"/><text x="485" y="489" class="small">Domov | Zgodovina | Zdravila | Nastavitve</text>

  <!-- phone 3 -->
  <rect x="820" y="150" width="340" height="460" class="phone"/>
  <text x="850" y="185" class="screenTitle">3) Vnos simptomov</text>
  <rect x="845" y="205" width="290" height="28" class="box"/><text x="855" y="224" class="text">Datum/cas (samodejno)</text>
  <rect x="845" y="243" width="290" height="58" class="box"/><text x="855" y="275" class="text">Simptomi...</text>
  <rect x="845" y="311" width="290" height="28" class="box"/><text x="855" y="330" class="text">Intenzivnost 1-10 (slider)</text>
  <rect x="845" y="349" width="290" height="28" class="box"/><text x="855" y="368" class="text">Pocutje: Slabo | OK | Dobro</text>
  <rect x="845" y="387" width="290" height="56" class="box"/><text x="855" y="418" class="text">Opombe...</text>
  <rect x="845" y="455" width="138" height="36" class="btnSecondary"/><text x="875" y="478" class="text">Govorni vnos</text>
  <rect x="997" y="455" width="138" height="36" class="btnPrimary"/><text x="1045" y="478" class="text" fill="#fff">Shrani</text>

  <!-- phone 4 -->
  <rect x="1200" y="150" width="340" height="460" class="phone"/>
  <text x="1230" y="185" class="screenTitle">4) Zdravila in opomniki</text>
  <rect x="1225" y="205" width="290" height="36" class="btnPrimary"/><text x="1320" y="228" class="text" fill="#fff">+ Dodaj zdravilo</text>
  <rect x="1225" y="253" width="290" height="86" class="box"/>
  <text x="1235" y="274" class="text">Lekadol 500mg</text>
  <text x="1235" y="294" class="small">1 tableta | 08:00, 20:00</text>
  <text x="1235" y="314" class="small">Uredi | Izbrisi | Opomniki ON</text>
  <rect x="1225" y="351" width="290" height="86" class="box"/>
  <text x="1235" y="372" class="text">Vitamin D</text>
  <text x="1235" y="392" class="small">1 kapsula | 09:00</text>
  <text x="1235" y="412" class="small">Uredi | Izbrisi | Opomniki ON</text>

  <!-- phone 5 -->
  <rect x="60" y="670" width="340" height="460" class="phone"/>
  <text x="90" y="705" class="screenTitle">5) Zgodovina vnosov</text>
  <rect x="85" y="725" width="290" height="28" class="box"/><text x="95" y="744" class="text">Filter: Dan | Teden | Mesec</text>
  <rect x="85" y="763" width="290" height="28" class="box"/><text x="95" y="782" class="text">Iskanje...</text>
  <rect x="85" y="801" width="290" height="200" class="box"/>
  <text x="95" y="825" class="small">21.04.2026 08:00  Simptom: glavobol (5/10)</text>
  <text x="95" y="845" class="small">21.04.2026 08:05  Meritev: 36.8 C, 72 bpm</text>
  <text x="95" y="865" class="small">21.04.2026 09:00  Zdravilo: Vitamin D</text>
  <text x="95" y="885" class="small">...</text>

  <!-- phone 6 -->
  <rect x="440" y="670" width="340" height="460" class="phone"/>
  <text x="470" y="705" class="screenTitle">6) OCR skeniranje</text>
  <rect x="465" y="725" width="290" height="170" class="box"/>
  <text x="545" y="815" class="text">Kamera predogled</text>
  <rect x="465" y="907" width="290" height="36" class="btnPrimary"/><text x="560" y="930" class="text" fill="#fff">Zajemi sliko</text>
  <rect x="465" y="955" width="290" height="96" class="box"/>
  <text x="475" y="978" class="small">Prepoznano besedilo:</text>
  <text x="475" y="998" class="small">LEKADOL 500 mg, paracetamol...</text>
  <rect x="465" y="1060" width="138" height="36" class="btnSecondary"/><text x="488" y="1083" class="small">Ponovi</text>
  <rect x="617" y="1060" width="138" height="36" class="btnSecondary"/><text x="628" y="1083" class="small">Uporabi rezultat</text>

  <!-- phone 7 -->
  <rect x="820" y="670" width="340" height="460" class="phone"/>
  <text x="850" y="705" class="screenTitle">7) AI povzetek</text>
  <rect x="845" y="725" width="290" height="250" class="box"/>
  <text x="855" y="750" class="small">Povzetek (zadnjih 7 dni):</text>
  <text x="855" y="772" class="small">- Pogosti glavoboli (4 vnosi)</text>
  <text x="855" y="792" class="small">- Povprecna temperatura: 36.9 C</text>
  <text x="855" y="812" class="small">- Jemanje zdravil: redno</text>
  <text x="855" y="846" class="small">Priporocilo:</text>
  <text x="855" y="866" class="small">Nadaljuj z rednim belezenjem.</text>
  <text x="855" y="900" class="small">Opomba: ni diagnoza.</text>
  <rect x="845" y="987" width="290" height="36" class="btnPrimary"/><text x="943" y="1010" class="text" fill="#fff">Osvezi povzetek</text>

  <!-- phone 8 -->
  <rect x="1200" y="670" width="340" height="460" class="phone"/>
  <text x="1230" y="705" class="screenTitle">8) Nastavitve</text>
  <rect x="1225" y="725" width="290" height="40" class="box"/><text x="1235" y="749" class="text">Jezik: Slovenscina</text>
  <rect x="1225" y="775" width="290" height="40" class="box"/><text x="1235" y="799" class="text">Tema: Svetla / Temna</text>
  <rect x="1225" y="825" width="290" height="40" class="box"/><text x="1235" y="849" class="text">Obvestila: ON/OFF</text>
  <rect x="1225" y="875" width="290" height="40" class="box"/><text x="1235" y="899" class="text">Zasebni nacin: ON/OFF</text>
  <rect x="1225" y="925" width="290" height="40" class="box"/><text x="1235" y="949" class="text">Izvoz podatkov</text>
  <rect x="1225" y="985" width="290" height="36" class="btnPrimary"/><text x="1310" y="1008" class="text" fill="#fff">Shrani</text>

  <text x="60" y="1180" class="subtitle">Opomba: Mockupi so namenjeni predstavitvi strukture in uporabniskega toka.</text>
</svg>
